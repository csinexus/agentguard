name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install AgentGuard
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

  self-scan:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AgentGuard
        run: pip install -e .

      - name: Scan AgentGuard's own test fixtures
        run: agentguard scan tests/fixtures/clean_manifest.json --fail-on critical,high
